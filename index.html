<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Solernou Generador PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; padding:20px; max-width:700px; margin:auto; background:#f5f5f5;">

  <h2 style="text-align:center;">Solernou Generador PRO</h2>

  <input id="link" placeholder="Pegá el link de la propiedad" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc;" />
  
  <button onclick="generar()" style="margin-top:10px; width:100%; padding:12px; border:none; background:black; color:white; border-radius:8px;">
    Generar Ficha
  </button>

  <div id="resultado" style="margin-top:20px;"></div>

  <script>
    function generar() {
      const url = document.getElementById("link").value;

      if (!url) {
        alert("Pegá un link primero");
        return;
      }

      document.getElementById("resultado").innerHTML = `
        <div style="background:white; padding:15px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
          
          <h3 style="margin-bottom:10px;">Vista de la propiedad</h3>

          <iframe src="${url}" style="width:100%; height:400px; border:none; border-radius:8px;"></iframe>

          <div style="margin-top:15px;">
            <a href="${url}" target="_blank">
              <button style="width:100%; padding:10px; margin-bottom:10px;">Ver publicación completa</button>
            </a>

            <button onclick="contactar()" style="width:100%; padding:10px; margin-bottom:10px; background:green; color:white; border:none; border-radius:6px;">
              Contactar por WhatsApp
            </button>

            <button onclick="compartir('${url}')" style="width:100%; padding:10px;">
              Compartir por WhatsApp
            </button>
          </div>

          <div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
            <strong>Solernou Servicios Inmobiliarios</strong><br>
            WhatsApp: 11-6616-9242
          </div>

        </div>
      `;
    }

    function contactar() {
      window.open("https://wa.me/5491166169242");
    }

    function compartir(url) {
      const texto = "Consulto por esta propiedad: " + url;
      window.open("https://wa.me/5491166169242?text=" + encodeURIComponent(texto));
    }
  </script>

</body>
</html>
