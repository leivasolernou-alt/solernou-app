<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Solernou Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{font-family:Arial;background:#f2f2f2;margin:0;padding:20px}
    .container{max-width:900px;margin:auto}
    .card{background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(0,0,0,.1);overflow:hidden;margin-top:20px}
    .img{width:100%;height:260px;object-fit:cover;background:#ddd}
    .content{padding:16px}
    .title{font-size:20px;font-weight:700}
    .desc{font-size:14px;color:#555;margin:10px 0}
    .btn{display:block;width:100%;padding:12px;margin-top:8px;border:none;border-radius:8px;cursor:pointer}
    .primary{background:#000;color:#fff}
    .whatsapp{background:#25D366;color:#fff}
    input{width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;margin-bottom:10px}
    .linkBox{background:#eee;padding:10px;border-radius:8px;font-size:12px;word-break:break-all;margin-top:10px}
  </style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const MIS_DATOS = {
  nombre: "Solernou Servicios Inmobiliarios",
  whatsapp: "5491166169242"
};

let propiedades = JSON.parse(localStorage.getItem('props') || '[]');

function guardar(){
  localStorage.setItem('props', JSON.stringify(propiedades));
}

async function generar(url){
  let titulo='Propiedad';
  let descripcion='';
  let imagen='';

  try{
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    const doc = new DOMParser().parseFromString(data.contents,'text/html');

    titulo = doc.querySelector("meta[property='og:title']")?.content || doc.title;
    descripcion = doc.querySelector("meta[property='og:description']")?.content || '';
    imagen = doc.querySelector("meta[property='og:image']")?.content || '';
  }catch(e){}

  const id = Date.now();
  propiedades.push({id,titulo,descripcion,imagen,url});
  guardar();
  location.hash = "#/ficha/"+id;
}

function vistaHome(){
  return `
    <h2>Solernou Portal</h2>
    <input id="link" placeholder="Pegá link propiedad" />
    <button class="btn primary" onclick="generar(document.getElementById('link').value)">Generar</button>

    <h3>Mis propiedades</h3>
    ${propiedades.map(p=>`
      <div class="card">
        ${p.imagen ? `<img src="${p.imagen}" class="img">` : `<div class="img"></div>`}
        <div class="content">
          <div class="title">${p.titulo}</div>
          <button class="btn" onclick="ver(${p.id})">Ver ficha</button>
        </div>
      </div>
    `).join('')}
  `;
}

function vistaFicha(id){
  const p = propiedades.find(x=>x.id==id);
  if(!p) return '<p>No encontrada</p>';

  const link = location.origin + location.pathname + '#/ficha/' + id;

  return `
    <div class="card">
      ${p.imagen ? `<img src="${p.imagen}" class="img">` : `<div class="img"></div>`}
      <div class="content">
        <div class="title">${p.titulo}</div>
        <div class="desc">${p.descripcion}</div>

        <button class="btn primary" onclick="window.open('${p.url}')">Ver propiedad</button>
        <button class="btn whatsapp" onclick="contactar('${p.url}')">WhatsApp</button>

        <div class="linkBox">${link}</div>
        <button class="btn" onclick="copiarLink('${link}')">Copiar link</button>
      </div>
    </div>
  `;
}

function ver(id){
  location.hash = "#/ficha/"+id;
}

function copiarLink(link){
  navigator.clipboard.writeText(link);
  alert('Link copiado');
}

function contactar(url){
  const msg = `Hola, consulto por esta propiedad: ${url}`;
  window.open(`https://wa.me/${MIS_DATOS.whatsapp}?text=${encodeURIComponent(msg)}`);
}

function router(){
  const hash = location.hash;
  if(hash.startsWith('#/ficha/')){
    const id = hash.split('/')[2];
    document.getElementById('app').innerHTML = vistaFicha(id);
  }else{
    document.getElementById('app').innerHTML = vistaHome();
  }
}

window.addEventListener('hashchange', router);
router();
</script>

</body>
</html>
